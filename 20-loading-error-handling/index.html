<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loading & Error Handling</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
    }
    
    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .loading {
      color: blue;
    }

    .error {
      color: red;
    }

    img {
      border-radius: 50%;
    }
  </style>
</head>
<body>

  <h1>GitHub User Finder</h1>

  <input type="text" id="username" placeholder="Enter username">
  <button onclick="getUser()">Search</button>

  <div id="status"></div>
  <div id="result"></div>

  <script>
    async function getUser() {
      const username = document.getElementById("username").value;
      const status = document.getElementById("status");
      const result = document.getElementById("result");

      if (!username) {
        status.innerHTML = "<p class='error'>Enter username!</p>";
        return;
      }

      try {
        status.innerHTML = "<p class='loading'>Loading...</p>";
        result.innerHTML = "";

        const res = await fetch(`https://api.github.com/users/${username}`);

        if (!res.ok) {
          throw new Error("User not found");
        }

        const data = await res.json();

        status.innerHTML = "";

        result.innerHTML = `
          <div class="card">
            <img src="${data.avatar_url}" width="100">
            <h2>${data.name}</h2>
            <p>${data.bio || "No bio"}</p>
            <p>Followers: ${data.followers}</p>
          </div>
        `;
      } catch (error) {
        status.innerHTML = `<p class="error">${error.message}</p>`;
      }
    }
  </script>

</body>
</html>
