<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Async JavaScript Practice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Async JavaScript</h1>

    <!-- Timer Section -->
    <h3>Timer (1 to 10)</h3>
    <button id="startTimer">Start Timer</button>
    <p id="timerDisplay">0</p>

    <!-- Timeout Section -->
    <h3>Delayed Alert</h3>
    <button id="delayBtn">Show Alert After 3 sec</button>

    <!-- Interval Section -->
    <h3>Interval Control</h3>
    <button id="startInterval">Start Interval</button>
    <button id="stopInterval">Stop Interval</button>
    <p id="intervalDisplay">0</p>

  </div>

  <script src="script.js"></script>
</body>
</html>
