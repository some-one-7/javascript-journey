<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Constructors & Classes</title>
</head>
<body>

  <h1>Open Console (F12)</h1>

  <script>
    console.log("=== Constructor Functions ===");

    // 🔹 1. Constructor Function
    function User(name, age) {
      this.name = name;
      this.age = age;
    }

    const user1 = new User("Rahul", 20);
    const user2 = new User("Aman", 22);

    console.log(user1);
    console.log(user2);

    // 🔹 2. Adding method using Prototype
    User.prototype.greet = function() {
      console.log("Hello " + this.name);
    };

    user1.greet();
    user2.greet();

    console.log("=== ES6 Classes ===");

    // 🔹 3. Class syntax
    class Product {
      constructor(name, price) {
        this.name = name;
        this.price = price;
      }

      showDetails() {
        console.log(this.name + " costs ₹" + this.price);
      }
    }

    const p1 = new Product("Laptop", 50000);
    p1.showDetails();

    // 🔹 4. Inheritance using class
    class Admin extends User {
      constructor(name, age, role) {
        super(name, age);
        this.role = role;
      }

      showRole() {
        console.log(this.name + " is " + this.role);
      }
    }

    const admin1 = new Admin("Vikas", 30, "Super Admin");

    admin1.greet(); // from User
    admin1.showRole();

  </script>

</body>
</html>
